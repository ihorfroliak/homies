openapi: 3.1.0
info:
  title: Homies Auth & Identity API
  version: 0.1.0
  description: >
    Registration, login, token refresh, and profile for all roles
    (client, worker, manager, admin). JWT bearer tokens; refresh via
    rotating refresh tokens.
  contact:
    name: Homies
servers:
  - url: https://api.homies.example/v1
    description: Production (placeholder)
  - url: http://localhost:8000/v1
    description: Local development
tags:
  - name: auth
    description: Authentication and token lifecycle
  - name: profile
    description: Current user profile
paths:
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      description: Creates an account in the requested role and sends a verification message. Emits UserRegistered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created; verification required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Exchange credentials for a token pair
      description: Validates email + password and issues a short-lived access token with a rotating refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Rotate refresh token and issue a new access token
      description: Consumes the presented refresh token and returns a fresh pair; reuse of a consumed token revokes the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      operationId: getCurrentUser
      tags: [profile]
      summary: Get the authenticated user's profile
      description: Returns the profile of the user identified by the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          description: E.164, Polish numbers expected (+48...)
        password:
          type: string
          minLength: 10
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          const: bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds
    Role:
      type: string
      enum: [client, worker, manager, admin]
    User:
      type: object
      required: [id, email, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
